<!DOCTYPE html>
<html>
<body>
    <h2 style="color: #2e7d32;">Payment Successful! ✅</h2>
    <p>Hello {{ name }},</p>
    <p>We've successfully processed your payment for <strong>Order #{{ order_id }}</strong>.</p>
    <p><strong>Amount Paid:</strong> {{ currency }} {{ amount }}</p>
    <p>Your order status is now: <strong>PROCESSING</strong>. We are getting your items ready for shipment!</p>
    <p>We'll keep you updated on the process</p>
    <p>Thank you!</p>
</body>
</html>
